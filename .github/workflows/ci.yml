name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      WEBCHAT_TOKEN: ci-webchat-token-123456
      WEBCHAT_RESUME_TOKEN: ci-resume-token-123456
      BLUE_TANUKI_SETTINGS_TOKEN: ci-settings-token-123456
      LLM_BACKEND: stub
      SLACK_BOT_TOKEN: ci-slack-bot-token
      SLACK_APP_TOKEN: ci-slack-app-token
      DISCORD_BOT_TOKEN: ci-discord-bot-token
      MICROSOFT_GRAPH_ACCESS_TOKEN: ci-microsoft-graph-token
      LINE_CHANNEL_ACCESS_TOKEN: ci-line-channel-token
      ANTHROPIC_API_KEY: ci-anthropic-api-key
      GITHUB_TOKEN: ci-github-token
      BLUE_TANUKI_GITHUB_REPOS: gatchimuchio/blue-tanuki
      BLUE_TANUKI_AUDIT_DIR: .blue-tanuki/audit
      BLUE_TANUKI_SESSION_DIR: .blue-tanuki/sessions
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm docs:check
      - run: pnpm validate:repo-health
      - run: pnpm validate:packaging
      - run: pnpm validate:channels
      - run: pnpm plugin:review -- --package packages/channel-slack --bundled
      - run: pnpm validate:ga
      - run: pnpm smoke:serve
      - run: pnpm smoke:resume
      - run: pnpm smoke:live
      - run: pnpm run doctor
      - name: Doctor fails closed without core credentials
        run: |
          set +e
          WEBCHAT_TOKEN= WEBCHAT_RESUME_TOKEN= pnpm run doctor
          status=$?
          set -e
          test "$status" -eq 2
      - run: pnpm release:bundle -- --dry-run
      - run: pnpm release:bundle
      - run: pnpm release:verify

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t blue-tanuki:ci .
