name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      WEBCHAT_TOKEN: ci-webchat-token-123456
      WEBCHAT_RESUME_TOKEN: ci-resume-token-123456
      BLUE_TANUKI_SETTINGS_TOKEN: ci-settings-token-123456
      LLM_BACKEND: stub
      SLACK_BOT_TOKEN: ""
      SLACK_APP_TOKEN: ""
      DISCORD_BOT_TOKEN: ""
      BLUE_TANUKI_AUDIT_DIR: .blue-tanuki/audit
      BLUE_TANUKI_SESSION_DIR: .blue-tanuki/sessions
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm smoke:serve
      - run: pnpm smoke:resume
      - run: pnpm smoke:live
      - run: pnpm run doctor
      - run: pnpm release:bundle -- --dry-run
      - run: pnpm release:bundle
      - run: pnpm release:verify

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t blue-tanuki:ci .
